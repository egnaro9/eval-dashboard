name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install
        run: npm ci
      - name: Audit (informational — clean at commit time)
        run: npm audit --audit-level=moderate || true
      - name: Build (static export; also type-checks)
        run: npm run build
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
